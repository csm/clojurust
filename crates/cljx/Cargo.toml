[package]
name = "cljx"
version = "0.1.0"
edition = "2024"
description = "clojurust CLI — run, repl, compile, and eval"

[[bin]]
name = "cljx"
path = "src/main.rs"

[dependencies]
cljx-types    = { workspace = true }
cljx-gc       = { workspace = true }
cljx-reader   = { workspace = true }
cljx-value    = { workspace = true }
cljx-eval     = { workspace = true }
cljx-runtime  = { workspace = true }
cljx-compiler = { workspace = true }
cljx-interop  = { workspace = true }
clap          = { workspace = true }
miette        = { workspace = true }
