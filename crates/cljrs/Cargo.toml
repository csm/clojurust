[package]
name = "cljrs"
version = "0.1.0"
edition = "2024"
description = "clojurust CLI — run, repl, compile, and eval"
license.workspace = true
repository.workspace = true

[features]
# Propagate no-gc to all direct dependencies; transitive deps pick it up through their own feature chains.
no-gc = [
    "cljrs-gc/no-gc",
    "cljrs-value/no-gc",
    "cljrs-eval/no-gc",
    "cljrs-compiler/no-gc",
    "cljrs-runtime/no-gc",
    "cljrs-stdlib/no-gc",
]
enable-rustyline = ["rustyline"]

[[bin]]
name = "cljrs"
path = "src/main.rs"

[dependencies]
cljrs-types    = { workspace = true }
cljrs-gc       = { workspace = true }
cljrs-reader   = { workspace = true }
cljrs-value    = { workspace = true }
cljrs-eval     = { workspace = true }
cljrs-stdlib   = { workspace = true }
cljrs-runtime  = { workspace = true }
cljrs-compiler = { workspace = true }
cljrs-interop  = { workspace = true }
cljrs-logging  = { workspace = true }
clap          = { workspace = true }
miette        = { workspace = true }
tracing-subscriber = "0.3.23"
tracing = "0.1.44"
rustyline = { workspace = true, optional = true }