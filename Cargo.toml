[workspace]
members = [
    "crates/cljrs-types",
    "crates/cljrs-gc",
    "crates/cljrs-value",
    "crates/cljrs-reader",
    "crates/cljrs-eval",
    "crates/cljrs-stdlib",
    "crates/cljrs-runtime",
    "crates/cljrs-ir",
    "crates/cljrs-compiler",
    "crates/cljrs-interop",
    "crates/cljrs-logging",
    "crates/cljrs",
    "examples/rust-interop",
    "crates/cljrs-env",
    "crates/cljrs-builtins",
    "crates/cljrs-interp",
    "crates/cljrs-ir-prebuild"]
resolver = "2"

[workspace.package]
license = "EPL-1.0"
repository = "https://github.com/csm/clojurust"

[workspace.dependencies]
cljrs-types    = { path = "crates/cljrs-types" }
cljrs-gc       = { path = "crates/cljrs-gc" }
cljrs-value    = { path = "crates/cljrs-value" }
cljrs-reader   = { path = "crates/cljrs-reader" }
cljrs-eval     = { path = "crates/cljrs-eval" }
cljrs-stdlib   = { path = "crates/cljrs-stdlib" }
cljrs-runtime  = { path = "crates/cljrs-runtime" }
cljrs-ir       = { path = "crates/cljrs-ir" }
cljrs-compiler = { path = "crates/cljrs-compiler" }
cljrs-interop  = { path = "crates/cljrs-interop" }
cljrs-logging  = { path = "crates/cljrs-logging" }
cljrs-env      = { path = "crates/cljrs-env" }
cljrs-builtins = { path = "crates/cljrs-builtins" }
cljrs-interp   = { path = "crates/cljrs-interp" }
cljrs-ir-prebuild = { path = "crates/cljrs-ir-prebuild" }

miette       = { version = "7", features = ["fancy"] }
thiserror    = "2"
clap         = { version = "4", features = ["derive"] }
num-bigint   = "0.4"
num-rational = "0.4"
num-traits   = "0.2"
bigdecimal   = "0.4"
rand         = "0.10.1"
rpds         = "1"
uuid         = "1.22.0"
tokio        = "1.50.0"
regex        = "1.12.3"
serde        = "1.0.228"
postcard     = "1.1.3"
rustyline    = "18.0.0"

# Cranelift compiler backend (all crates must be at the same version)
cranelift-codegen  = "0.129.1"
cranelift-frontend = "0.129.1"
cranelift-module   = "0.129.1"
cranelift-object   = "0.129.1"
cranelift-native   = "0.129.1"
target-lexicon     = "0.13"
