name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/book/**"
      - "crates/cljrs-wasm/**"
      - "crates/cljrs-interp/**"
      - "crates/cljrs-env/**"
      - "crates/cljrs-builtins/**"
      - "crates/cljrs-gc/**"
      - "crates/cljrs-value/**"
      - "crates/cljrs-reader/**"
      - "crates/cljrs-types/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; in-progress runs are not cancelled so a
# completed deployment is never skipped.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build book + WASM REPL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build book
        run: mdbook build docs/book

      - name: Install Rust toolchain (wasm32)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM REPL
        run: wasm-pack build crates/cljrs-wasm --target web --no-typescript --release

      - name: Copy WASM files into book
        run: |
          mkdir -p docs/book/book/wasm
          cp crates/cljrs-wasm/pkg/cljrs_wasm.js \
             crates/cljrs-wasm/pkg/cljrs_wasm_bg.wasm \
             docs/book/book/wasm/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/book

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
