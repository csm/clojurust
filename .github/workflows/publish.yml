name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BASE_VERSION: "0.1"

jobs:
  ci:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Tests
        run: cargo test --workspace
      - name: Clojure Tests
        run: cargo run -p cljrs compile -o test-suite --test ./clojure-test-suite/test && ./test-suite

  publish:
    name: Publish to crates.io
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-release
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-release

      - name: Set crate versions
        run: |
          VERSION="${BASE_VERSION}.${{ github.run_number }}"
          echo "Publishing version: $VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          cargo release version "$VERSION" --execute --no-confirm
          echo "--- Workspace Cargo.toml ---"
          cat Cargo.toml
          echo ""
          echo "--- Sample crate Cargo.toml ---"
          cat crates/cljrs-types/Cargo.toml
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git commit -m "chore: release $VERSION"
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo release publish --execute --no-confirm
